metadata:
  name: "dummy-application-service"
  version: "1.0.0"
  environment: "development"
  last_updated_by: "system"

server:
  host: "0.0.0.0"
  port: 8080
  timeout: 30
  scaling:
    min_replicas: 1
    max_replicas: 3

features:
  enable_logging: true
  enable_telemetry: false
  beta_features:
    - "mcp-routing"
    - "agent-memory-v2"

database:
  type: "postgresql"
  connection_timeout: 5
  pooling:
    max_size: 10
